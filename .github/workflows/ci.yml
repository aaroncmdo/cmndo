name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

# wait-for-vercel-preview pollt Deployment-Status via GITHUB_TOKEN.
# Ohne explizite Grants läuft der Token je nach Repo-Default read-only
# auf contents — dann kippt die Action mit "Resource not accessible by
# integration". Explizite minimal-Grants hier.
permissions:
  contents: read
  deployments: read
  statuses: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Next.js-Build-Cache — webpack + SWC wiederverwenden wenn
      # Source-Hash gleich. Spart ~50% Build-Zeit bei incremental Changes.
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}', 'public/**/*', 'next.config.*', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Typecheck
        run: npm run typecheck
        env:
          # tsc --noEmit OOMt im Default-2-GB-Heap auf GH-Runnern, seit die
          # Codebase die Schwelle gerissen hat. 4 GB gibt Puffer.
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Lint
        run: npm run lint
        continue-on-error: true  # 30 React 19 lint errors (setState in effect, etc) — wird in separatem Cleanup gefixt

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=4096
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # AAR-616: Dynamische Vercel-Preview-URL je PR.
      # Vorher: statischer `PLAYWRIGHT_BASE_URL`-Secret → zeigte auf fixe
      # Staging/Prod-URL, E2E validierte nie den PR-Code.
      # Jetzt: warten bis Vercel den Preview-Deploy fertig hat, URL als
      # Step-Output weiterreichen an den Playwright-Run. Für Push auf
      # main/staging (Production/Staging-Deploys) Fallback auf das
      # PLAYWRIGHT_BASE_URL-Secret wenn noch vorhanden.
      - name: Wait for Vercel Preview (PR)
        if: github.event_name == 'pull_request'
        id: vercel-preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 15

      # Playwright Browser-Binaries cachen — Chromium-Install
      # dauert sonst 30-60s pro Run.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        # Bei Cache-Hit nur System-Dependencies (apt) neu installieren, keine
        # Browser-Binaries. Sonst voller Install.
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run E2E Tests
        run: npx playwright test
        env:
          # AAR-616: Preview-URL > Fallback-Secret > Default in playwright.config.ts
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel-preview.outputs.url || secrets.PLAYWRIGHT_BASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_SV_EMAIL: ${{ secrets.TEST_SV_EMAIL }}
          TEST_SV_PASSWORD: ${{ secrets.TEST_SV_PASSWORD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
