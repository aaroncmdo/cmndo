name: CI

on:
  pull_request:
  push:
    branches: [main, staging]

# wait-for-vercel-preview pollt Deployment-Status via GITHUB_TOKEN.
# Ohne explizite Grants läuft der Token je nach Repo-Default read-only
# auf contents — dann kippt die Action mit "Resource not accessible by
# integration". Explizite minimal-Grants hier.
permissions:
  contents: read
  deployments: read
  statuses: read
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**/*.{ts,tsx,js,jsx}', 'public/**/*', 'next.config.*', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Typecheck
        run: npm run typecheck
        env:
          # tsc --noEmit OOMt im Default-2-GB-Heap auf GH-Runnern. 2026-05-12:
          # 4 GB reichten nicht mehr (Next.js-16-Build-OOM in der TS-Phase),
          # auf 8 GB hochgezogen — gleicher Wert wie deploy-vps.yml ihn nutzt.
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Lint
        run: npm run lint
        continue-on-error: true

      # AAR-token-audit (PR #1025): Drift-Bremse gegen nicht-dokumentierte Hex-
      # Verwendungen in src/. Blockt neue `bg-[#xxx]` Klassen + raw inline-hex
      # in `style={{ }}` ohne `var(--brand-*)` Fallback. Siehe
      # scripts/check-token-audit.mjs für Whitelist + Skip-Header-Konvention.
      - name: Token-Audit
        run: npm run check:token-audit

      # AAR-tailwind-arbitrary: Drift-Bremse gegen leere Tailwind-Arbitrary-Klassen
      # die den PostCSS-Parser brechen (Width-Utility mit leerem var-Aufruf). Siehe
      # scripts/check-tailwind-arbitrary.mjs.
      - name: Tailwind-Arbitrary
        run: npm run check:tailwind-arbitrary

      - name: Build
        run: npm run build
        env:
          # 2026-05-12: 4 GB → 8 GB. Next.js 16 Build OOMte in der
          # "Running TypeScript ..."-Post-Compile-Phase (FATAL ERROR:
          # heap out of memory) — der eigentliche Compile war grün.
          # Gleicher Heap wie deploy-vps.yml, sonst ist CI rot obwohl
          # der Production-Deploy durchläuft.
          NODE_OPTIONS: --max-old-space-size=8192
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_CLARITY_ID: ${{ secrets.NEXT_PUBLIC_CLARITY_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Kein Vercel-Preview-Wait mehr — E2E läuft gegen app.claimondo.de (Production-VPS).
      # PRs werden nach Merge auf main getestet, nicht gegen Preview-Deploys.

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Chromium
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: Run E2E Tests
        run: npx playwright test
        env:
          PLAYWRIGHT_BASE_URL: https://app.claimondo.de
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_SV_EMAIL: ${{ secrets.TEST_SV_EMAIL }}
          TEST_SV_PASSWORD: ${{ secrets.TEST_SV_PASSWORD }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Traces
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7
