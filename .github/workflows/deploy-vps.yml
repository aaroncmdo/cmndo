name: Deploy → VPS (app.claimondo.de)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build (standalone)
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_IMAGIN_CUSTOMER: ${{ secrets.NEXT_PUBLIC_IMAGIN_CUSTOMER }}
          NEXT_PUBLIC_ELEVENLABS_VOICE_ID: ${{ secrets.NEXT_PUBLIC_ELEVENLABS_VOICE_ID }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Artefakt packen
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf deploy.tar.gz -C .next/standalone .

      - name: Deploy auf VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 212.132.119.110
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.132.119.110
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /var/www/claimondo-v2-new
            tar -xzf /tmp/deploy.tar.gz -C /var/www/claimondo-v2-new
            cp /var/www/claimondo-v2/.env.local /var/www/claimondo-v2-new/.env.local 2>/dev/null || true
            rm -rf /var/www/claimondo-v2-old 2>/dev/null || true
            mv /var/www/claimondo-v2 /var/www/claimondo-v2-old 2>/dev/null || true
            mv /var/www/claimondo-v2-new /var/www/claimondo-v2
            pm2 restart claimondo-v2 || pm2 start /var/www/claimondo-v2/server.js \
              --name claimondo-v2 \
              --env production \
              --max-memory-restart 1400M
            pm2 save
            rm -f /tmp/deploy.tar.gz
            echo "Deploy $(date) abgeschlossen"
