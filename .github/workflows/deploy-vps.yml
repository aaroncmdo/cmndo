name: Deploy → VPS (app.claimondo.de)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build (standalone)
        run: npm run build
        env:
          # NEXT_PUBLIC_* werden zur Build-Zeit in den Client-Bundle gebaked.
          # Alle Vars die im Browser/Client-Code via process.env.NEXT_PUBLIC_*
          # genutzt werden, MÜSSEN hier stehen — sonst sind sie zur Runtime
          # undefined und Features (Maps, Cesium, HERE) fallen still aus.
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_KEY }}
          NEXT_PUBLIC_GOOGLE_MAPS_3D_TILES_KEY: ${{ secrets.NEXT_PUBLIC_GOOGLE_MAPS_3D_TILES_KEY }}
          NEXT_PUBLIC_HERE_API_KEY: ${{ secrets.NEXT_PUBLIC_HERE_API_KEY }}
          NEXT_PUBLIC_CESIUM_ION_TOKEN: ${{ secrets.NEXT_PUBLIC_CESIUM_ION_TOKEN }}
          NEXT_PUBLIC_CESIUM_ION_ASSET_ID: ${{ secrets.NEXT_PUBLIC_CESIUM_ION_ASSET_ID }}
          NEXT_PUBLIC_FELDMODUS_CESIUM_TILES: ${{ secrets.NEXT_PUBLIC_FELDMODUS_CESIUM_TILES }}
          NEXT_PUBLIC_FELDMODUS_GOOGLE_TILES: ${{ secrets.NEXT_PUBLIC_FELDMODUS_GOOGLE_TILES }}
          NEXT_PUBLIC_IMAGIN_CUSTOMER: ${{ secrets.NEXT_PUBLIC_IMAGIN_CUSTOMER }}
          NEXT_PUBLIC_ELEVENLABS_VOICE_ID: ${{ secrets.NEXT_PUBLIC_ELEVENLABS_VOICE_ID }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Artefakt packen
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          tar -czf deploy.tar.gz -C .next/standalone .

      - name: Deploy auf VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 212.132.119.110
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          source: deploy.tar.gz
          target: /tmp/

      - name: Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 212.132.119.110
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            mkdir -p /var/www/claimondo-v2-new
            tar -xzf /tmp/deploy.tar.gz -C /var/www/claimondo-v2-new
            cp /var/www/claimondo-v2/.env.local /var/www/claimondo-v2-new/.env.local 2>/dev/null || true
            rm -rf /var/www/claimondo-v2-old 2>/dev/null || true
            mv /var/www/claimondo-v2 /var/www/claimondo-v2-old 2>/dev/null || true
            mv /var/www/claimondo-v2-new /var/www/claimondo-v2
            # Idempotenter Restart: alle Prozesse mit dem Namen löschen + neu starten.
            # Behebt das Zombie-Problem (Run #25605528728): wenn id 1 (alter
            # cluster-Prozess) im stopped-State steckt, scheitert pm2 restart
            # an dem toten ID, der Fallback "pm2 start" failt weil der Name
            # belegt ist von id 2. Delete-First-Pattern ist robust dagegen.
            pm2 delete claimondo-v2 2>/dev/null || true
            pm2 start /var/www/claimondo-v2/server.js \
              --name claimondo-v2 \
              --env production \
              --max-memory-restart 1400M \
              --cwd /var/www/claimondo-v2
            pm2 save
            rm -f /tmp/deploy.tar.gz
            echo "Deploy $(date) abgeschlossen"
